name: sonic-vpp01

topology:
  nodes:
    router1:
      kind: sonic-vm
      image: ghcr.io/pantheontech/sonic-vpp-vs:vxlan-poc-260225
    router2:
      kind: sonic-vm
      image: ghcr.io/pantheontech/sonic-vpp-vs:vxlan-poc-260225
    PC1:
      kind: linux
      image: praqma/network-multitool:latest
    PC2:
      kind: linux
      image: praqma/network-multitool:latest

  links:
    - endpoints: ["router1:eth1", "router2:eth1"]
    - endpoints: ["PC1:eth2", "router1:eth2"]
    - endpoints: ["PC2:eth2", "router2:eth2"]
